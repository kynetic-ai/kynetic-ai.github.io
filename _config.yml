# Site settings
title: kynetic intelligence
email: hello@kynetic.ai
description: "One brain. Any robot."
baseurl: ""
url: "https://kynetic.ai"
github_username: kynetic-ai

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Navigation
navigation:
  - {name: Home, link: /}
  - {name: Blog, link: /blog/}
  - {name: About, link: /about/}

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
